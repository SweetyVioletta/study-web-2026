version: '3.8'
services:
  web:
    image: nginx:latest
    ports:
      - "9191:80"
    volumes:
      - ./code/:/var/www/html
      - ./vendor/:/var/www/html/vendor
      - ./tests/:/var/www/html/tests
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - default_network
  php:
    build: .
    volumes:
      - ./code/:/var/www/html
      - ./vendor/:/var/www/html/vendor
      - ./tests/:/var/www/html/tests
    depends_on:
      - db
      - redis
      - elasticsearch
      - clickhouse
    networks:
      - default_network

  redis:
    image: redis:latest
    container_name: lab6_redis
    ports:
      - "6389:6379"
    networks:
      - default_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: lab6_elastic
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - default_network

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: lab6_clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    networks:
      - default_network

  db:
    image: mysql:8.0
    container_name: lab5_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: lab5_db
      MYSQL_USER: lab5_user
      MYSQL_PASSWORD: lab5_pass
    ports:
      - "3307:3306"
    networks:
      - default_network

  adminer:
    image: adminer
    container_name: lab5_adminer
    restart: always
    ports:
      - "8087:8080"
    depends_on:
      - db

networks:
  default_network:
    driver: bridge